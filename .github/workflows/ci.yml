name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: '5.10'

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Debug -DTPP_ENABLE_TEST_CPP_UNITY=OFF

      - name: Build
        run: cmake --build build --parallel

      - name: Build Java & Swift tests
        run: cmake --build build --target build_all_tests --parallel

      - name: Test
        run: ctest --parallel --output-on-failure --test-dir build
